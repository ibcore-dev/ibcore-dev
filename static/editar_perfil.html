<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Perfil - Órion</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

.header {
    height: 80px;
    background: url("logo_orion.png") center/cover no-repeat;
}

.container {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.profile-pic {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    margin: auto;
}

.field {
    margin-top: 15px;
}

.field input, .field textarea {
    width: 95%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1e4fd8;
}

footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="header"></div>

<div class="container">

    <img id="preview" class="profile-pic">

    <input type="file" onchange="uploadFoto(event)">

    <div class="field">
        <label>Nome</label>
        <input id="nome">
    </div>

    <div class="field">
        <label>Relacionamento</label>
        <input id="relacionamento">
    </div>

    <div class="field">
        <label>Data de nascimento</label>
        <input id="nascimento" type="date">
    </div>

    <div class="field">
        <label>Profissão</label>
        <input id="profissao">
    </div>

    <div class="field">
        <label>Bio</label>
        <textarea id="bio"></textarea>
    </div>

    <button onclick="salvarPerfil()">Salvar Perfil</button>

</div>

<footer>
© 2026 IB Core Systems | Fundador Thyago Braga
</footer>


<script>

const API = "http://127.0.0.1:8000";

let token = localStorage.getItem("token");

if (!token) {
    alert("Faça login novamente");
    window.location.href = "login.html";
}

let fotoAtual = null;

// ==========================
// 🖼️ UPLOAD FOTO
// ==========================
async function uploadFoto(event){
    let file = event.target.files[0];
    if(!file) return;

    let formData = new FormData();
    formData.append("file", file);

    try {
        let r = await fetch(API + "/upload-profile-image", {
            method: "POST",
            headers: { "Authorization": "Bearer " + token },
            body: formData
        });

        if (!r.ok) throw new Error("Erro upload");

        let data = await r.json();
        fotoAtual = data.image_url;

        document.getElementById("preview").src =
            API + "/" + data.image_url;

    } catch(e){
        console.error(e);
        alert("Erro ao enviar foto");
    }
}

// ==========================
// 💾 SALVAR PERFIL
// ==========================
async function salvarPerfil(){

    let data = {
        nome: document.getElementById("nome").value,
        relacionamento: document.getElementById("relacionamento").value,
        nascimento: document.getElementById("nascimento").value,
        profissao: document.getElementById("profissao").value,
        bio: document.getElementById("bio").value
    };

    if(fotoAtual){
        data.foto = fotoAtual;
    }

    try {
        let r = await fetch(API + "/profile/save", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(data)
        });

        if (!r.ok) {
            let text = await r.text();
            console.error("Erro backend:", text);
            throw new Error("Erro salvar");
        }

        let res = await r.json();
        console.log("SALVO:", res);

        alert("Perfil salvo com sucesso!");
        window.location.href = "comunidade.html";

    } catch(e){
        console.error(e);
        alert("Erro ao salvar perfil");
    }
}

// ==========================
// 📥 CARREGAR PERFIL
// ==========================
async function carregarPerfil(){
    try {
        let r = await fetch(API + "/profile/me", {
            headers: { "Authorization": "Bearer " + token }
        });

        if (!r.ok) throw new Error("Erro carregar");

        let data = await r.json();

        document.getElementById("nome").value = data.nome || "";
        document.getElementById("relacionamento").value = data.relacionamento || "";
        document.getElementById("nascimento").value = data.nascimento || "";
        document.getElementById("profissao").value = data.profissao || "";
        document.getElementById("bio").value = data.bio || "";

        if(data.foto){
            fotoAtual = data.foto;
            document.getElementById("preview").src =
                API + "/" + data.foto;
        }

    } catch(e){
        console.error(e);
        alert("Erro ao carregar perfil");
    }
}

// START
window.onload = () => {
    carregarPerfil();
};

</script>


</body>
</html>
